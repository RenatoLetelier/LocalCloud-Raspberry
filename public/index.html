<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Server</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --card: #1e1e2c;
      --card-hover: #272738;
      --accent: #7c6aff;
      --accent-hover: #9585ff;
      --danger: #ff5b5b;
      --success: #4caf82;
      --text: #e0e0e8;
      --text-dim: #888899;
      --border: #2a2a40;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ───────────────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    .login-card h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .login-card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; }

    input[type="password"] {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: var(--accent); }

    button { cursor: pointer; font-family: inherit; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 500;
      border: none;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      justify-content: center;
      padding: 12px;
      font-size: 1rem;
      margin-top: 14px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }

    .btn-icon {
      background: var(--card);
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: var(--radius);
    }
    .btn-icon:hover { color: var(--text); background: var(--card-hover); }
    .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 10px; min-height: 20px; }

    /* ── APP ─────────────────────────────────────────────── */
    #app-screen { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1.05rem; font-weight: 600; margin-right: auto; white-space: nowrap; }

    .filter-tabs { display: flex; gap: 4px; }

    .tab {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); background: var(--card); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    main {
      padding: 20px 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .stats-bar { color: var(--text-dim); font-size: 0.82rem; margin-bottom: 16px; }

    /* ── GALLERY ─────────────────────────────────────────── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
    }

    .media-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.12s, border-color 0.12s;
    }
    .media-card:hover { transform: translateY(-2px); border-color: var(--accent); }

    .media-thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .video-thumb {
      width: 100%;
      aspect-ratio: 1;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    .video-thumb svg { width: 38px; height: 38px; }

    .card-info { padding: 8px 10px 10px; }
    .card-name {
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-size { font-size: 0.71rem; color: var(--text-dim); margin-top: 2px; }

    /* ── EMPTY / LOADING ─────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--text-dim);
      gap: 12px;
      text-align: center;
    }
    .empty-state svg { width: 56px; height: 56px; opacity: 0.25; }
    .empty-state h3 { font-size: 1rem; color: var(--text); }
    .empty-state p { font-size: 0.85rem; }

    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PAGINATION ──────────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px 0;
    }
    .page-info { color: var(--text-dim); font-size: 0.85rem; padding: 0 6px; }

    /* ── MODAL VIEWER ────────────────────────────────────── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal.open { display: flex; }

    #modal-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 95vw;
      max-height: 95vh;
    }
    #modal-content img {
      max-width: 92vw;
      max-height: 86vh;
      object-fit: contain;
      border-radius: 8px;
    }
    #modal-content video {
      max-width: 92vw;
      max-height: 86vh;
      border-radius: 8px;
      background: #000;
    }
    #modal-filename {
      color: var(--text-dim);
      font-size: 0.82rem;
      margin-top: 10px;
    }
    #modal-close {
      position: fixed;
      top: 14px;
      right: 14px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      z-index: 101;
      transition: background 0.15s;
    }
    #modal-close:hover { background: rgba(255,255,255,0.15); }

    /* ── UPLOAD PANEL ────────────────────────────────────── */
    #upload-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 90;
      align-items: center;
      justify-content: center;
    }
    #upload-panel.open { display: flex; }

    .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.72); }

    .upload-box {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 500px;
      z-index: 1;
    }
    .upload-box h2 { font-size: 1.1rem; margin-bottom: 18px; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      color: var(--text-dim);
      transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .drop-zone.drag-over { border-color: var(--accent); background: rgba(124,106,255,0.06); }
    .drop-zone svg { width: 36px; height: 36px; margin-bottom: 10px; opacity: 0.45; }
    .drop-zone p { font-size: 0.85rem; margin-top: 4px; }
    .drop-zone span { color: var(--accent); }

    #file-input { display: none; }

    .upload-queue {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
    }

    .upload-item {
      background: var(--card);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .upload-item-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.82rem;
      margin-bottom: 6px;
    }
    .upload-item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .upload-item-status {
      font-size: 0.78rem;
      margin-left: 10px;
      white-space: nowrap;
    }
    .status-pending  { color: var(--text-dim); }
    .status-uploading { color: var(--accent); }
    .status-done   { color: var(--success); }
    .status-error  { color: var(--danger); }

    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.1s; }

    .upload-actions { display: flex; gap: 10px; margin-top: 18px; }
    .upload-actions .btn-primary { margin-top: 0; width: auto; flex: 1; }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 560px) {
      header { padding: 10px 14px; gap: 8px; }
      main { padding: 14px; }
      .gallery { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
      .login-card { padding: 30px 22px; margin: 16px; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <h1>Media Server</h1>
    <p>Enter your password to access your media library.</p>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
    <button class="btn btn-primary" id="login-btn">Sign in</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────── -->
<div id="app-screen">
  <header>
    <h1>Media Server</h1>
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="photo">Photos</button>
      <button class="tab" data-filter="video">Videos</button>
    </div>
    <button class="btn btn-icon" id="upload-btn" title="Upload files">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload
    </button>
    <button class="btn btn-ghost" id="logout-btn">Logout</button>
  </header>

  <main>
    <div class="stats-bar" id="stats-bar"></div>
    <div id="gallery-container"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- ── MODAL VIEWER ───────────────────────────────────────── -->
<div id="modal">
  <button id="modal-close" title="Close (Esc)">✕</button>
  <div id="modal-content"></div>
</div>

<!-- ── UPLOAD PANEL ───────────────────────────────────────── -->
<div id="upload-panel">
  <div class="upload-overlay" id="upload-overlay"></div>
  <div class="upload-box">
    <h2>Upload Media</h2>
    <div class="drop-zone" id="drop-zone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <div>Drop files here or <span id="file-browse">browse</span></div>
      <p>Supports photos and videos — no size limit</p>
    </div>
    <input type="file" id="file-input" multiple
      accept="image/*,video/*,.mkv,.avi,.flv,.wmv,.m4v,.3gp,.ts">
    <div class="upload-queue" id="upload-queue"></div>
    <div class="upload-actions">
      <button class="btn btn-primary" id="start-upload-btn" disabled>Upload All</button>
      <button class="btn btn-ghost" id="close-upload-btn">Close</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let token = localStorage.getItem('mediaToken');
let currentFilter = 'all';
let currentPage = 1;
let totalPages = 1;
const LIMIT = 48;

// ── UTILS ──────────────────────────────────────────────────
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
}

// Embed the JWT as a query param so <video> and <img> elements can
// authenticate without custom headers (which HTML media elements don't support)
function mediaUrl(filename) {
  return `/media/file/${encodeURIComponent(filename)}?token=${encodeURIComponent(token)}`;
}

function setToken(t) {
  token = t;
  if (t) localStorage.setItem('mediaToken', t);
  else localStorage.removeItem('mediaToken');
}

async function apiFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { 'Authorization': `Bearer ${token}`, ...(options.headers || {}) },
  });
  if (res.status === 401) {
    setToken(null);
    showLogin();
    throw new Error('session_expired');
  }
  return res;
}

// ── SCREENS ────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  loadMedia();
}

// ── LOGIN ──────────────────────────────────────────────────
async function login() {
  const pwd = document.getElementById('password-input').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!pwd) { errEl.textContent = 'Please enter a password.'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.textContent = '';

  try {
    const r = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || 'Login failed.'; return; }
    setToken(data.token);
    document.getElementById('password-input').value = '';
    showApp();
  } catch {
    errEl.textContent = 'Connection error. Is the server running?';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

// ── GALLERY ────────────────────────────────────────────────
async function loadMedia(filter, page) {
  if (filter !== undefined) currentFilter = filter;
  if (page !== undefined) currentPage = page;

  const container = document.getElementById('gallery-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('pagination').innerHTML = '';

  const params = new URLSearchParams({ page: currentPage, limit: LIMIT });
  if (currentFilter !== 'all') params.set('type', currentFilter);

  try {
    const r = await apiFetch(`/media?${params}`);
    const data = await r.json();
    totalPages = data.totalPages || 1;
    renderGallery(data.data || [], data.total);
    renderPagination(data.page, totalPages);
  } catch (err) {
    if (err.message !== 'session_expired') {
      container.innerHTML = '<div class="empty-state"><p>Failed to load media.</p></div>';
    }
  }
}

function renderGallery(items, total) {
  const container = document.getElementById('gallery-container');
  const statsBar = document.getElementById('stats-bar');
  const label = currentFilter === 'photo' ? 'photos' : currentFilter === 'video' ? 'videos' : 'items';
  statsBar.textContent = total > 0 ? `${total} ${label}` : '';

  if (!items.length) {
    const msg = currentFilter === 'photo' ? 'No photos found.'
              : currentFilter === 'video' ? 'No videos found.'
              : 'No media files found.';
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <h3>${msg}</h3>
        <p>Upload some files to get started.</p>
      </div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'gallery';

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'media-card';
    card.title = item.filename;

    if (item.type === 'photo') {
      const img = document.createElement('img');
      img.className = 'media-thumb';
      img.loading = 'lazy';
      img.src = mediaUrl(item.filename);
      img.alt = item.filename;
      img.onerror = () => { img.style.opacity = '0.3'; };
      card.appendChild(img);
    } else {
      const thumb = document.createElement('div');
      thumb.className = 'video-thumb';
      thumb.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
        </svg>`;
      card.appendChild(thumb);
    }

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `
      <div class="card-name">${item.filename}</div>
      <div class="card-size">${formatSize(item.size)}</div>`;
    card.appendChild(info);

    card.addEventListener('click', () => openViewer(item));
    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

function renderPagination(page, total) {
  if (total <= 1) return;
  const el = document.getElementById('pagination');

  const prev = document.createElement('button');
  prev.className = 'btn btn-icon';
  prev.textContent = '←';
  prev.disabled = page <= 1;
  prev.onclick = () => loadMedia(currentFilter, page - 1);

  const info = document.createElement('span');
  info.className = 'page-info';
  info.textContent = `Page ${page} of ${total}`;

  const next = document.createElement('button');
  next.className = 'btn btn-icon';
  next.textContent = '→';
  next.disabled = page >= total;
  next.onclick = () => loadMedia(currentFilter, page + 1);

  el.append(prev, info, next);
}

// ── VIEWER ─────────────────────────────────────────────────
function openViewer(item) {
  const content = document.getElementById('modal-content');
  content.innerHTML = '';

  if (item.type === 'photo') {
    const img = document.createElement('img');
    img.src = mediaUrl(item.filename);
    img.alt = item.filename;
    content.appendChild(img);
  } else {
    const video = document.createElement('video');
    video.src = mediaUrl(item.filename);
    video.controls = true;
    video.autoplay = true;
    video.preload = 'metadata';
    content.appendChild(video);
  }

  const fname = document.createElement('div');
  fname.id = 'modal-filename';
  fname.textContent = item.filename + (item.size ? ` · ${formatSize(item.size)}` : '');
  content.appendChild(fname);

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeViewer() {
  const content = document.getElementById('modal-content');
  const video = content.querySelector('video');
  if (video) { video.pause(); video.src = ''; }
  content.innerHTML = '';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ── UPLOAD ─────────────────────────────────────────────────
let uploadQueue = [];

function openUploadPanel() {
  uploadQueue = [];
  document.getElementById('upload-queue').innerHTML = '';
  document.getElementById('start-upload-btn').disabled = true;
  document.getElementById('upload-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeUploadPanel() {
  document.getElementById('upload-panel').classList.remove('open');
  document.body.style.overflow = '';
  uploadQueue = [];
  document.getElementById('upload-queue').innerHTML = '';
}

function addFilesToQueue(files) {
  const queueEl = document.getElementById('upload-queue');
  Array.from(files).forEach(file => {
    const idx = uploadQueue.length;
    uploadQueue.push({ file, status: 'pending' });

    const item = document.createElement('div');
    item.className = 'upload-item';
    item.id = `upload-item-${idx}`;
    item.innerHTML = `
      <div class="upload-item-header">
        <span class="upload-item-name">${file.name}</span>
        <span class="upload-item-status status-pending" id="status-${idx}">${formatSize(file.size)}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-${idx}" style="width:0%"></div>
      </div>`;
    queueEl.appendChild(item);
  });

  document.getElementById('start-upload-btn').disabled = uploadQueue.length === 0;
}

async function startUploads() {
  document.getElementById('start-upload-btn').disabled = true;

  for (let i = 0; i < uploadQueue.length; i++) {
    if (uploadQueue[i].status !== 'pending') continue;
    uploadQueue[i].status = 'uploading';
    setItemStatus(i, 'uploading', 'Uploading…');

    await new Promise(resolve => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/media/upload');
      xhr.setRequestHeader('Authorization', `Bearer ${token}`);

      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          document.getElementById(`progress-${i}`).style.width = pct + '%';
          setItemStatus(i, 'uploading', pct + '%');
        }
      };

      xhr.onload = () => {
        if (xhr.status === 201) {
          uploadQueue[i].status = 'done';
          const fill = document.getElementById(`progress-${i}`);
          fill.style.width = '100%';
          fill.style.background = 'var(--success)';
          setItemStatus(i, 'done', 'Done');
        } else {
          uploadQueue[i].status = 'error';
          let msg = 'Error';
          try { msg = JSON.parse(xhr.responseText).error || 'Error'; } catch {}
          setItemStatus(i, 'error', msg);
        }
        resolve();
      };

      xhr.onerror = () => {
        uploadQueue[i].status = 'error';
        setItemStatus(i, 'error', 'Network error');
        resolve();
      };

      const fd = new FormData();
      fd.append('file', uploadQueue[i].file);
      xhr.send(fd);
    });
  }

  if (uploadQueue.some(q => q.status === 'done')) loadMedia();
}

function setItemStatus(idx, cls, text) {
  const el = document.getElementById(`status-${idx}`);
  if (el) { el.className = `upload-item-status status-${cls}`; el.textContent = text; }
}

// ── EVENT LISTENERS ────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (token) showApp(); else showLogin();

  document.getElementById('login-btn').addEventListener('click', login);
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    setToken(null); showLogin();
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      loadMedia(tab.dataset.filter, 1);
    });
  });

  document.getElementById('modal-close').addEventListener('click', closeViewer);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeViewer();
  });

  document.getElementById('upload-btn').addEventListener('click', openUploadPanel);
  document.getElementById('close-upload-btn').addEventListener('click', closeUploadPanel);
  document.getElementById('upload-overlay').addEventListener('click', closeUploadPanel);
  document.getElementById('start-upload-btn').addEventListener('click', startUploads);

  document.getElementById('file-browse').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', e => {
    addFilesToQueue(e.target.files);
    e.target.value = '';
  });

  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) addFilesToQueue(e.dataTransfer.files);
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('modal').classList.contains('open')) closeViewer();
      else if (document.getElementById('upload-panel').classList.contains('open')) closeUploadPanel();
    }
  });
});
</script>
</body>
